<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="setup-container">
        <h2>Quiz Setup</h2>
        <div id="setup-controls">
            <div class="control-row">
                <select id="subject-select" disabled>
                    <option value="">Select subject...</option>
                </select>
            </div>
            <div class="control-row">
                <select id="category-select" disabled>
                    <option value="All">All Categories</option>
                </select>
            </div>
            <div class="control-row checkboxes">
                <label><input type="checkbox" id="shuffle-questions" checked> Shuffle Questions</label>
                <label><input type="checkbox" id="shuffle-options" checked> Shuffle Options</label>
                <label><input type="checkbox" id="study-mode"> Study Mode</label>
            </div>
            <div id="question-count-display"></div>
            <button id="start-btn" disabled>Start Quiz</button>
            <button id="resume-progress-btn" style="display: none; background-color: #607D8B; color: white;">Resume Last Quiz</button>
            <button id="practice-incorrect-btn" style="display: none; background-color: #ff9800; color: white;">Practice Incorrect [0]</button>
            <button id="clear-stats-btn" style="display: none; background-color: #f44336; color: white;">Delete Last Quiz</button>
            <button id="open-editor-btn" disabled>Open JSON Editor</button>
        </div>
        <div id="setup-error"></div>
    </div>

    <div id="quiz-container" style="display: none;">
        <div id="header">
            <div id="category-box">
                <span id="category-letter"></span>
                <span id="category-topic"></span>
                <span id="question-filename"></span>
            </div>
            <div id="progress-text"></div>
        </div>
        <div id="question-text"></div>
        <div id="input-container"></div>
        <div class="action-buttons-group">
            <div class="left-actions">
                <button id="submit-btn">Submit</button>
                <button id="next-btn" style="display: none;">Next</button>
                <button id="prev-btn" style="display: none;">Previous</button>
            </div>
            <div id="star-container" class="star-container" style="display: none;">
                <span class="star-label">Mark question</span>
                <span id="star-btn" class="star-icon">☆</span>
            </div>
        </div>
        <div id="result-area"></div>
        <div id="bottom-actions">
            <div class="left-bottom-actions">
                <button id="exit-btn">Back to Menu</button>
                <button id="retry-btn" style="display: none;">Retry Incorrect</button>
            </div>
            <button id="quiz-open-editor-btn" style="background-color: #2196F3; color: white;">Open JSON Editor</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
