<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div id="setup-container">
        <h2>Quiz Setup</h2>
        <div id="setup-controls">
            <div class="control-row">
                <select id="subject-select" disabled>
                    <option value="">Select subject...</option>
                </select>
            </div>
            <div class="control-row">
                <select id="category-select" disabled>
                    <option value="All">📚 All Categories</option>
                </select>
            </div>
            <div class="checkboxes">
                <label><input type="checkbox" id="shuffle-questions" checked> Shuffle Questions</label>
                <label><input type="checkbox" id="shuffle-options" checked> Shuffle Options</label>
                <label><input type="checkbox" id="study-mode"> Study Mode</label>
            </div>
            <div id="question-count-display"></div>
            
            <div class="setup-actions">
                <button id="start-btn" class="btn-green" disabled>Start New Quiz</button>
                <button id="resume-progress-btn" class="btn-blue-grey" style="display: none;">Resume Last Quiz</button>
                <button id="practice-incorrect-btn" class="btn-orange" style="display: none;">Practice Incorrect [0]</button>
                <button id="clear-stats-btn" class="btn-red" style="display: none;">Delete Last Quiz</button>
                <button id="open-editor-btn" class="btn-green" disabled>Open JSON Editor</button>
            </div>
            
            <span id="version-info">Version 1.9 | Made in Schmalle with ☕</span>
        </div>
        <div id="setup-error"></div>
    </div>

    <div id="quiz-container" style="display: none;">
        <div id="header">
            <div id="category-letter"></div>
            <div id="category-topic"></div>
            <div id="header-badges">
                <span id="question-filename"></span>
                <div id="progress-text"></div>
            </div>
        </div>
        
        <div id="question-text"></div>
        <div id="input-container"></div>
        
        <div class="action-buttons-group">
            <div class="left-actions">
                <button id="prev-btn" class="btn-blue" style="display: none;">Previous</button>
                <button id="submit-btn" class="btn-green">Submit</button>
                <button id="next-btn" class="btn-blue" style="display: none;">Next</button>
            </div>
            <div id="star-container" class="star-container" style="display: none;">
                <span class="star-label">Mark</span>
                <span id="star-btn" class="star-icon">☆</span>
            </div>
        </div>
        
        <div id="result-area"></div>
        
        <div id="bottom-actions">
            <button id="exit-btn" class="btn-red">Back to Menu</button>
            <button id="quiz-open-editor-btn" class="btn-blue">JSON Editor</button>
        </div>
    </div>
    
    <script type="module" src="src/app.js"></script>
</body>
</html>
