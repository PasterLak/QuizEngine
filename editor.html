<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Editor</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="style/editor.css">
</head>
<body>
    <div id="editor-header">
        <span id="editor-subject-title"></span>
        <div class="header-buttons">
            <button id="save-btn">Save</button>
            <button id="download-btn">Download</button>
            <button id="close-btn">Close</button>
        </div>
    </div>
    <div id="editor-container">
        <textarea id="json-textarea" spellcheck="false"></textarea>
        <pre id="highlighting" aria-hidden="true"><code id="highlighting-content" class="language-json"></code></pre>
    </div>
    <script type="module" src="src/editor.js"></script>
</body>
</html>
